<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>José Justi FC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
  <header class="header">
  <div class="header__top">
    <div class="header__top-container">
      <a href="#transparencia" class="header__link">Transparência</a>
      <a href="#negocios" class="header__link">Negócios</a>
      <a href="#imprensa" class="header__link">Imprensa</a>
    </div>
  </div>

  <div class="header__main">
    <div class="header__main-container">
      
      <nav class="header__nav">
        <div class="header__dropdown">
          <a href="#clube" class="header__link">Clube <i class="fas fa-chevron-down"></i></a>
        </div>
        <a href="#futebol" class="header__link">Futebol</a>
        <a href="#modalidades" class="header__link">Modalidades</a>
        <a href="#ingressos" class="header__link">Ingressos/Planos</a>
      </nav>

      <div class="header__logo-container">
        <a href="#home">
          <img src="sua-logo.png" alt="José Justi FC" class="header__logo">
        </a>
      </div>

      <div class="header__right">
        <nav class="header__nav">
          <a href="#noticias" class="header__link">Notícias</a>
          <a href="#jogos" class="header__link">Próximos Jogos</a>
          <a href="#contato" class="header__link">Contato</a>
        </nav>
        
        <div class="header__search">
          <input type="text" placeholder="Buscar..." class="search__input">
          <button class="search__btn"><i class="fas fa-search"></i></button>
        </div>
      </div>

    </div>
  </div>
</header>
    <main class="main" id="main"></main>

    <footer class="footer">
      <div class="container footer__inner">
        <p>&copy; 2026 José Justi FC. Todos os direitos reservados.</p>
        <div class="footer__social">
          <a href="#"><i class="fab fa-facebook-f"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
      </div>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
